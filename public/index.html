<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Café - 三猫协作聊天室</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      width: 90%;
      max-width: 1200px;
      height: 90vh;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 { font-size: 24px; margin-bottom: 10px; }
    .cats {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 10px;
    }
    .cat-badge {
      background: rgba(255,255,255,0.2);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .cat-badge:hover { background: rgba(255,255,255,0.3); }
    .cat-badge.active { background: rgba(255,255,255,0.4); }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .message {
      margin-bottom: 15px;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 70%;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      background: #667eea;
      color: white;
      margin-left: auto;
    }
    .message.architect {
      background: #fff;
      border-left: 4px solid #667eea;
    }
    .message.developer {
      background: #fff;
      border-left: 4px solid #f093fb;
    }
    .message.frontend {
      background: #fff;
      border-left: 4px solid #4facfe;
    }
    .message-header {
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      transition: border 0.3s;
    }
    .input-area input:focus { border-color: #667eea; }
    .input-area button {
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.2s;
    }
    .input-area button:hover { transform: scale(1.05); }
    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .loading {
      text-align: center;
      padding: 10px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🐱 Cat Café - 三猫协作聊天室</h1>
      <div class="cats">
        <div class="cat-badge active" data-cat="architect">🎨 架构师 (GPT-5.2)</div>
        <div class="cat-badge" data-cat="developer">💻 开发者 (GPT-5.2)</div>
        <div class="cat-badge" data-cat="frontend">🎭 前端 (MiniMax-M2.5)</div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="输入消息... (使用 @architect @developer @frontend 召唤猫猫)" />
      <button id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';
    const THREAD_ID = 'thread-' + Date.now();
    const USER_ID = 'user-' + Math.random().toString(36).slice(2);
    let currentCat = 'architect';
    let isLoading = false;

    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // Cat selection
    document.querySelectorAll('.cat-badge').forEach(badge => {
      badge.addEventListener('click', () => {
        document.querySelectorAll('.cat-badge').forEach(b => b.classList.remove('active'));
        badge.classList.add('active');
        currentCat = badge.dataset.cat;
      });
    });

    // Add message to UI
    function addMessage(catId, content) {
      const msg = document.createElement('div');
      msg.className = `message ${catId}`;

      const header = document.createElement('div');
      header.className = 'message-header';
      const catNames = {
        user: '你',
        architect: '🎨 架构师',
        developer: '💻 开发者',
        frontend: '🎭 前端'
      };
      header.textContent = catNames[catId] || catId;

      const text = document.createElement('div');
      text.textContent = content;

      msg.appendChild(header);
      msg.appendChild(text);
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Send message
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      messageInput.disabled = true;

      addMessage('user', message);
      messageInput.value = '';

      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'loading';
      loadingDiv.textContent = '猫猫正在思考...';
      messagesDiv.appendChild(loadingDiv);

      try {
        const response = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            threadId: THREAD_ID,
            userId: USER_ID,
            catId: currentCat,
            message: message,
            model: currentCat === 'frontend' ? 'minimax/minimax-m2.5' : 'openai/gpt52'
          })
        });

        const data = await response.json();
        messagesDiv.removeChild(loadingDiv);

        if (data.success) {
          addMessage(currentCat, data.response);

          // Show A2A responses
          if (data.a2aResponses) {
            for (const [catId, content] of Object.entries(data.a2aResponses)) {
              setTimeout(() => addMessage(catId, content), 500);
            }
          }
        } else {
          addMessage('system', '错误: ' + data.error);
        }
      } catch (error) {
        messagesDiv.removeChild(loadingDiv);
        addMessage('system', '网络错误: ' + error.message);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
      }
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Welcome message
    addMessage('system', '欢迎来到 Cat Café！选择一只猫猫开始对话，或使用 @mention 召唤其他猫猫。');
  </script>
</body>
</html>
